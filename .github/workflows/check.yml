name: CI

on:
  push:
    branches: [main, "update/*"]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    name: Evaluate NixOS configurations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Evaluate all host configurations
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
        run: |
          hosts=(gaming-pc optiplex blaney-pc justus-pc asus-laptop asus-m15 atl-mini-pc optiplex-nas mini-server vm-sandbox vm-blaney)
          failed=0
          for host in "${hosts[@]}"; do
            echo "::group::Evaluating $host"
            if nix eval --impure ".#nixosConfigurations.${host}.config.system.build.toplevel.drvPath" 2>&1; then
              echo "✓ $host OK"
            else
              echo "✗ $host FAILED"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

  build:
    name: Build fragile host toplevels
    # Runs on the self-hosted runner on optiplex-nas — its Nix store is warm from the
    # nightly flake-updater, so incremental PR builds only recompile changed derivations.
    # Unlike `evaluate`, this actually realizes the ~13 aerothemeplasma C++ derivations and
    # the openrazer out-of-tree kernel module, so source-build regressions (PR #74 / #83
    # class) fail CI instead of a user's rebuild. Headless server hosts stay eval-only.
    runs-on: [self-hosted, nixos]
    needs: evaluate
    # Only run on branches inside this repo (push) or same-repo PRs — never on fork PRs,
    # since a self-hosted runner must not execute untrusted code. Fork PRs still get the
    # `evaluate` gate on the GitHub-hosted runner.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build fragile toplevels
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
        run: |
          hosts=(gaming-pc blaney-pc optiplex asus-m15 vm-sandbox vm-blaney)
          failed=0
          # Cap parallelism: one derivation at a time, few cores each. When a heavy
          # package falls out of the binary cache and must build from source on the NAS
          # (e.g. librewolf/firefox), unbounded parallel compile jobs can exhaust RAM and
          # trip the OOM killer. Serializing trades speed for not OOMing a modest host.
          for host in "${hosts[@]}"; do
            echo "::group::Building $host"
            if nix build --impure --no-link --max-jobs 1 --cores 4 \
                 ".#nixosConfigurations.${host}.config.system.build.toplevel"; then
              echo "✓ $host built"
            else
              echo "✗ $host FAILED to build"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed
