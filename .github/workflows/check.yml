name: CI

on:
  push:
    branches: [main, "update/*"]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    name: Evaluate NixOS configurations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Evaluate all host configurations
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
        run: |
          hosts=(gaming-pc optiplex blaney-pc justus-pc asus-laptop asus-m15 atl-mini-pc optiplex-nas mini-server vm-sandbox vm-blaney)
          failed=0
          for host in "${hosts[@]}"; do
            echo "::group::Evaluating $host"
            if nix eval --impure ".#nixosConfigurations.${host}.config.system.build.toplevel.drvPath" 2>&1; then
              echo "✓ $host OK"
            else
              echo "✗ $host FAILED"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

  build:
    name: Build fragile derivations
    # Runs on the self-hosted runner on optiplex-nas — its Nix store is warm from the
    # nightly flake-updater, so incremental PR builds only recompile changed derivations.
    runs-on: [self-hosted, nixos]
    needs: evaluate
    # Only run on branches inside this repo (push) or same-repo PRs — never on fork PRs,
    # since a self-hosted runner must not execute untrusted code. Fork PRs still get the
    # `evaluate` gate on the GitHub-hosted runner.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build aerothemeplasma + openrazer
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
        run: |
          # Realize only the fragile *source-built* derivations this repo carries — NOT full
          # host toplevels. Building toplevels drags in browsers/steam/kernels that are
          # usually cached but OOM this modest NAS whenever they momentarily fall out of the
          # binary cache (e.g. an aged-out librewolf pin), for zero benefit to what we test.
          # These targets are the small C++/kernel-module builds that actually break on
          # nixpkgs bumps — the recurring aerothemeplasma (PR #74/#83) and openrazer
          # kernel-ABI classes. The `evaluate` job still type-checks every full toplevel.
          #
          # aerothemeplasma's ~13 KWin/Plasma C++ derivations, via the overlay on vm-sandbox
          # (host-independent — same drv on any aerotheme host):
          aero=(decoration smodsnap smodglow startupfeedback aeroglassblur aeroglide
                seventasks sevenstart desktopcontainment volume notifications aerothemeplasma)
          targets=()
          for p in "${aero[@]}"; do
            targets+=(".#nixosConfigurations.vm-sandbox.pkgs.$p")
          done
          # openrazer out-of-tree module, patched for the current kernel — from a host that
          # enables it. blaney-pc + optiplex share a kernel, so one build covers both.
          targets+=(".#nixosConfigurations.blaney-pc.config.boot.kernelPackages.openrazer")
          echo "Building ${#targets[@]} fragile derivations:"
          printf '  %s\n' "${targets[@]}"
          nix build --impure --no-link --print-out-paths "${targets[@]}"
